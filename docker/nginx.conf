server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Content-type for common static assets
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Long cache for hashed build assets
    location /_next/static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve pre-rendered HTML. Next's `output: export` with `trailingSlash: true`
    # produces `foo/index.html` for every route, so try those before 404ing.
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html /index.html =404;
    }

    # Basic hardening
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
}
