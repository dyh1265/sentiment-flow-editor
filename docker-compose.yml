services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sentiment-flow-editor:latest
    container_name: sentiment-flow-editor
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
